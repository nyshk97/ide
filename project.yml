name: ide
options:
  bundleIdPrefix: local.d0ne1s
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.7"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: YES

targets:
  ide:
    type: application
    platform: macOS
    sources:
      - Sources/ide
      - Resources/Assets.xcassets
      - path: Resources/preview
        type: folder
        buildPhase: resources
      # Ghostty 標準テーマ集（scripts/fetch-ghostty-themes.sh で取得）。
      # libghostty にはテーマが同梱されないので bundle し、GHOSTTY_RESOURCES_DIR
      # で参照させる（GhosttyManager の起動処理を参照）。<bundle>/Resources/ghostty/themes/ になる。
      - path: Resources/ghostty
        type: folder
        buildPhase: resources
      # Ghostty の terminfo（scripts/fetch-ghostty-terminfo.sh で生成）。
      # libghostty はシェルに TERM=xterm-ghostty と TERMINFO=<GHOSTTY_RESOURCES_DIR の隣>/terminfo
      # を必ずセットするが、xcframework には terminfo が同梱されていない。無いと terminfo が
      # 引けず入力中の表示が崩れる。<bundle>/Resources/terminfo/ に置けば libghostty が見つける。
      - path: Resources/terminfo
        type: folder
        buildPhase: resources
    dependencies:
      - framework: GhosttyKit.xcframework
        embed: false
      # ghostty-internal.a が依存するシステムフレームワーク（cmux と同じセット）
      - sdk: Metal.framework
      - sdk: QuartzCore.framework
      - sdk: IOSurface.framework
      - sdk: UniformTypeIdentifiers.framework
      - sdk: Carbon.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: local.d0ne1s.ide
        PRODUCT_NAME: IDE
        INFOPLIST_FILE: Resources/Info.plist
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        # ghostty-internal.a は C++ (glslang 等) を含むので libc++ をリンク
        # システムフレームワークは dependencies の sdk: 経由で追加される
        OTHER_LDFLAGS: -lc++
      configs:
        # Debug は Brew 配布版（Release）と Bundle ID / 表示名 / アイコンを分けて、
        # Application Support / Logs / Dock アイコンを完全に分離する。
        # 署名は ad-hoc のまま（ローカル検証用なので notarize 不要。プロセス名も "IDE Dev"）。
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: local.d0ne1s.ide.dev
          PRODUCT_NAME: IDE Dev
          ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon-Dev
        # Release は Developer ID 署名 + notarize（scripts/build.sh）。
        # 安定した署名 ID にすることで、brew 更新でバイナリの cdhash が変わっても
        # TCC（画面収録 / アクセシビリティ等）の許可が無効化されなくなる。
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application"
          DEVELOPMENT_TEAM: VYDUR99LAM
          CODE_SIGN_ENTITLEMENTS: Resources/IDE.entitlements
          OTHER_CODE_SIGN_FLAGS: --timestamp
