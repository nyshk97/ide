[tools]
# Xcode/Swift 系はシステム標準を使う前提（mise で固定しない）

[tasks.regen]
description = "project.yml から ide.xcodeproj を再生成"
run = "xcodegen generate"

[tasks.build]
description = "Debug ビルド（DerivedData は /tmp/ide-build。Sources/ 追加忘れ対策で先に regen を走らせる）"
depends = ["regen"]
run = "xcodebuild -project ide.xcodeproj -scheme ide -configuration Debug -destination 'platform=macOS' -derivedDataPath /tmp/ide-build build"

[tasks.run]
description = "ビルド済みアプリを再起動して開く（既存 IDE Dev プロセスを kill してから。Brew 版の IDE は触らない）"
run = """
pkill -x "IDE Dev" || true
open -n "/tmp/ide-build/Build/Products/Debug/IDE Dev.app"
"""
depends = ["build"]

[tasks.clean]
description = "DerivedData と生成物を消す"
run = """
rm -rf /tmp/ide-build
rm -rf ide.xcodeproj
"""
